# Supabase local config.
# Linked remote project ref: vzxrsvqnxkoiuwvdozxv (name: "fast-route", region: us-west-2)
#
# This file is intentionally minimal. If you adopt the Supabase CLI for local
# development, run `supabase init` to generate the full default template and
# merge it here, then `supabase link --project-ref vzxrsvqnxkoiuwvdozxv`.
project_id = "fast-route"

[api]
# Schemas exposed through the Data API (PostgREST). `public` and `graphql_public`
# are the Supabase defaults; `fast_route` is this app's own schema.
# REMOTE REMINDER: the remote project must ALSO add `fast_route` under
# Dashboard -> Settings -> API -> Exposed schemas.
schemas = ["public", "graphql_public", "fast_route"]
# Search path used when resolving unqualified names for API requests.
extra_search_path = ["public", "extensions", "fast_route"]

[db]
major_version = 17
