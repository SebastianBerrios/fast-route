<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión — Fast Route</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0c0e;
        color: #e9e8e6;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .card { max-width: 22rem; }
      .logo {
        width: 3rem; height: 3rem; margin: 0 auto 1rem;
        display: grid; place-items: center;
        background: #2563eb; border-radius: 0.9rem; font-size: 1.5rem;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #9a978f; line-height: 1.5; margin: 0 0 1.25rem; }
      button {
        background: #2563eb; color: #fff; border: 0;
        padding: 0.6rem 1.2rem; border-radius: 0.6rem;
        font-size: 0.95rem; font-weight: 600; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🚚</div>
      <h1>Sin conexión</h1>
      <p>
        Fast Route necesita internet para optimizar rutas y sincronizar datos.
        Revisá tu conexión e intentá de nuevo.
      </p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
